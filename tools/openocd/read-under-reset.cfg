# Connect-under-reset read of the GD32F303 (the reliable method — sidesteps the debug gate).
# HOLD the NRST button through the countdown + arm; RELEASE when told. Halts the core at the
# reset vector before firmware re-locks debug, so memory reads work regardless of app state.
# Extend the read section to chunked dumping (64 x 2KB, per-chunk retry) for a full image.
adapter driver cmsis-dap
transport select swd
adapter speed 300
swd newdap chip cpu -ignore-version
dap create chip.dap -chain-position chip.cpu
target create chip.mem mem_ap -dap chip.dap -ap-num 0
proc rd {n a} { if {[catch {set v [read_memory $a 32 1]}]} { echo "$n = FAIL" } else { echo "$n = [format 0x%08x [lindex $v 0]]" } }

echo ""
echo "=================================================="
echo "  HOLD the NRST button now. Connecting in 8s -"
echo "  keep holding through the arm step."
echo "=================================================="
for {set t 8} {$t > 0} {incr t -1} { echo "     $t ..."; sleep 1000 }
echo "  >>> connecting + arming (KEEP HOLDING) <<<"
init
catch { mww 0xE000EDF0 0xA05F0001 } ;# DHCSR = DBGKEY|C_DEBUGEN
catch { mww 0xE000EDFC 0x01000001 } ;# DEMCR = TRCENA|VC_CORERESET (halt-on-reset)

echo ""
echo "##################################################"
echo "#   ARMED.  >>> RELEASE THE NRST BUTTON NOW <<<   #"
echo "##################################################"
set result "timeout"; set fails 0
for {set i 0} {$i < 60000} {incr i} {
    if {[catch {set v [read_memory 0xE000EDF0 32 1]}]} {
        if {[incr fails] >= 400} { set result "running"; break }
    } else {
        set fails 0
        if {[expr {([lindex $v 0] & 0x20000) != 0}]} { set result "halted"; break }
    }
}
if {$result eq "halted"} {
    catch { mww 0xE000EDF0 0xA05F0003 } ;# stay halted
    echo ""
    echo "=== CORE HALTED - memory readable ==="
    rd "app SP    @08005000" 0x08005000
    rd "app Reset @08005004" 0x08005004
    rd "boot SP   @08000000" 0x08000000
    echo ""
    echo "   (edit here to read/dump any region while halted)"
} elseif {$result eq "running"} {
    echo ">>> core RUNNING (released too early / button not held). Rerun."
} else {
    echo ">>> timed out. Rerun."
}
shutdown
