# peek.cfg - halt the running app and RELIABLY read memory over the flaky debug gate.
#
# The gate makes single reads glitch, so rd3 reads each word until 3 consecutive reads agree
# (trustworthy enough to diff flashed memory vs the .bin). Core-REGISTER reads via DCRSR are
# still unreliable here (PC/LR sometimes, SP/xPSR usually stale) - prefer reading RAM/flash.
# To capture live app state, have the firmware write it to a fixed RAM word and rd3 that
# (see docs/hardware-and-debug.md "Getting reliable data out of the flaky gate").
#
# Edit the "READ WHAT YOU WANT" block, then:  openocd.exe -f peek.cfg
adapter driver cmsis-dap
transport select swd
adapter speed 80
swd newdap chip cpu -ignore-version
dap create chip.dap -chain-position chip.cpu
target create chip.mem mem_ap -dap chip.dap -ap-num 0
init
catch { chip.dap dpreg 0 0x1e }               ;# clear stale DP sticky errors

proc apw {r v} { catch { chip.dap apreg 0 $r $v } }
proc rdw {a} {                                 ;# one posted read, retried past glitches
    for {set i 0} {$i < 30} {incr i} {
        catch { chip.dap dpreg 0 0x1e }
        apw 0x04 $a
        catch { chip.dap apreg 0 0x0c }        ;# discard 1st (posted/stale)
        if {![catch {set x [chip.dap apreg 0 0x0c]}]} { return [format 0x%08x $x] }
    }
    return "FAIL"
}
proc rd3 {a} {                                 ;# read until 3 consecutive agree
    set h {}
    for {set i 0} {$i < 60} {incr i} {
        set v [rdw $a]
        if {$v eq "FAIL"} { set h {}; continue }
        lappend h $v
        set n [llength $h]
        if {$n >= 3 && [lindex $h [expr {$n-1}]] eq [lindex $h [expr {$n-2}]] \
                    && [lindex $h [expr {$n-2}]] eq [lindex $h [expr {$n-3}]]} { return $v }
    }
    return "unstable"
}

apw 0x00 0x23000002                            ;# CSW: 32-bit, no auto-increment
apw 0x04 0xe0042004 ; apw 0x0c 0x00000300      ;# freeze watchdogs on halt
apw 0x04 0xe000edf0 ; apw 0x0c 0xa05f0003      ;# halt (DHCSR C_HALT|C_DEBUGEN)
catch { chip.dap dpreg 0 0x1e }

# ---- READ WHAT YOU WANT ----------------------------------------------------
echo "DHCSR = [rd3 0xe000edf0]   (bit17 0x20000 S_HALT, bit19 0x80000 S_LOCKUP)"
echo "CFSR  = [rd3 0xe000ed28]   (0 = no fault; BFSR byte: b2 IMPRECISERR, b4 STKERR)"
echo "HFSR  = [rd3 0xe000ed2c]   (bit30 0x40000000 FORCED = escalated config fault)"
echo "VTOR  = [rd3 0xe000ed08]   (08005000 = app running; 0/08000000 = pre-VTOR / bootloader)"
# firmware progress word / flash diff examples:
# echo "mark  = [rd3 0x20000000]"
# echo "flash = [rd3 0x08005000]"
# ---------------------------------------------------------------------------

apw 0x04 0xe000edf0 ; apw 0x0c 0xa05f0001       ;# ALWAYS resume (else app stays halted)
echo "(resumed)"
shutdown
