# No-NRST live inspection of the RUNNING app over the 2 SWD wires (experimental).
# The debug gate blocks memory while running, but debug regs stay writable, so we HALT the
# core (which opens memory), raw-read, and resume. Uses raw AP transfers because OpenOCD's
# read_memory/cortex_m are incompatible with this gate.
adapter driver cmsis-dap
transport select swd
adapter speed 500
swd newdap chip cpu -ignore-version
dap create chip.dap -chain-position chip.cpu
target create chip.mem mem_ap -dap chip.dap -ap-num 0
init
catch { chip.dap dpreg 0 0x1e }               ;# clear any stale DP sticky errors

proc apw {r v} { catch { chip.dap apreg 0 $r $v } }
# posted-read: write TAR, read DRW twice (1st is stale), use 2nd. CSW must be no-autoinc.
proc rdw {a} {
    apw 0x04 $a
    catch { chip.dap apreg 0 0x0c }
    if {[catch {set x [chip.dap apreg 0 0x0c]}]} { return "FAIL" }
    return [format 0x%08x $x]
}

apw 0x00 0x23000002                            ;# CSW: 32-bit, no auto-increment
apw 0x04 0xe0042004 ; apw 0x0c 0x00000300      ;# DBG_CTL0 |= 0x300: freeze watchdogs on halt
apw 0x04 0xe000edf0 ; apw 0x0c 0xa05f0003      ;# DHCSR: C_HALT|C_DEBUGEN -> halt
catch { chip.dap dpreg 0 0x1e }

echo ""
echo "DHCSR    = [rdw 0xe000edf0]   (S_HALT bit17 set => halted)"
echo "--- memory (readable while halted) ---"
echo "SP    @08005000 = [rdw 0x08005000]"
echo "Reset @08005004 = [rdw 0x08005004]"
echo "RAM   @20000000 = [rdw 0x20000000]"
echo "--- live PC (DCRSR reg15 read -> DCRDR) ---"
apw 0x04 0xe000edf4 ; apw 0x0c 0x0000000f
echo "PC = [rdw 0xe000edf8]"

echo ""
echo "=== RESUME ==="
apw 0x04 0xe000edf0 ; apw 0x0c 0xa05f0001       ;# DHCSR: clear C_HALT -> run
echo "(resumed - if the blink didn't restart, power-cycle)"
shutdown
